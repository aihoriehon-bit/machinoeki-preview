<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex,nofollow">
<title>まちの駅 公式サイト</title>
<script src="./support.js"></script>
<script src="./site-mobile.js" defer></script>
</head>
<body>
<x-dc>
<helmet>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&family=Zen+Maru+Gothic:wght@500;700;900&display=swap" rel="stylesheet">
</helmet>
<footer style="background:#1a9d5e; font-family:'Noto Sans JP',sans-serif; padding:42px 24px 30px; width:100%; box-sizing:border-box;">
  <nav style="display:flex; flex-wrap:nowrap; justify-content:center; align-items:center; gap:0; max-width:100%; margin:0 auto 48px; overflow-x:auto;">
    <sc-for list="{{ items }}" as="item" hint-placeholder-count="7">
      <sc-if value="{{ item.isActive }}" hint-placeholder-val="{{ true }}">
        <a href="{{ item.href }}" style="color:#7fc2e6; text-decoration:none; font-size:12px; font-weight:700; white-space:nowrap; border-left:1px solid rgba(255,255,255,0.45); padding:2px 14px; transition:opacity .15s ease;" style-hover="opacity:0.7;">{{ item.label }}</a>
      </sc-if>
      <sc-if value="{{ item.isInactive }}" hint-placeholder-val="{{ true }}">
        <a href="{{ item.href }}" style="color:#ffffff; text-decoration:none; font-size:12px; font-weight:700; white-space:nowrap; border-left:1px solid rgba(255,255,255,0.45); padding:2px 14px; transition:opacity .15s ease;" style-hover="opacity:0.65;">{{ item.label }}</a>
      </sc-if>
    </sc-for>
  </nav>
  <div style="display:flex; justify-content:center; align-items:flex-start; gap:90px; flex-wrap:wrap;">
    <div style="background:#ffffff; border-radius:18px; padding:14px; display:inline-flex; align-items:center; justify-content:center;">
      <img src="assets/logo-vert.png" alt="まちの駅" style="display:block; height:150px; width:auto;">
    </div>
    <div style="color:#ffffff; text-align:center; line-height:2; font-size:13px; padding-top:8px;">
      <div style="font-weight:700; font-size:16px; margin-bottom:6px;">事務局</div>
      <div>NPO法人 地域交流センター</div>
      <div>〒101-0031 東京都千代田区東神田1-7-10</div>
      <div>KIビル3階</div>
      <div>TEL: 03-5823-4190</div>
      <div>FAX: 03-5823-4191</div>
    </div>
  </div>
  <div style="text-align:center; color:#ffffff; font-size:11px; margin-top:42px; opacity:0.9;">© NPO Regional Exchange Center All Rights Reserved.</div>
</footer>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:1280,&quot;height&quot;:420},&quot;active&quot;:{&quot;editor&quot;:&quot;enum&quot;,&quot;options&quot;:[&quot;home&quot;,&quot;about&quot;,&quot;become&quot;,&quot;goods&quot;,&quot;nationwide&quot;,&quot;members&quot;,&quot;contact&quot;],&quot;default&quot;:&quot;home&quot;,&quot;tsType&quot;:&quot;string&quot;}}">
class Component extends DCLogic {
  renderVals() {
    const active = this.props.active || 'home';
    const nav = [
      { key: 'home', label: 'ホーム', href: 'index.dc.html' },
      { key: 'about', label: 'まちの駅とは', href: 'about.dc.html' },
      { key: 'become', label: 'まちの駅になるには', href: 'become.dc.html' },
      { key: 'goods', label: 'オリジナルグッズ', href: 'goods.dc.html' },
      { key: 'nationwide', label: '全国まちの駅', href: 'nationwide.dc.html' },
      { key: 'members', label: 'まちの駅会員の方', href: 'members.dc.html' },
      { key: 'contact', label: 'お問い合わせ', href: 'contact.dc.html' },
    ];
    const items = nav.map(n => ({
      label: n.label, href: n.href,
      isActive: n.key === active, isInactive: n.key !== active,
    }));
    return { items };
  }
}
</script>
</body>
</html>
