<style>
  body { margin:0; }
  .home-hero-mobile-break {
    display: none;
  }
  @media (max-width: 720px) {
    .home-hero {
      height: 390px !important;
      background-position: center center !important;
    }
    .home-hero-content {
      padding: 0 22px 38px !important;
      width: 100%;
      max-width: 100%;
    }
    .home-hero-title {
      font-size: clamp(26px, 7.2vw, 29px) !important;
      line-height: 1.32 !important;
      max-width: 100%;
      letter-spacing: 0 !important;
    }
    .home-hero-title-line {
      white-space: nowrap;
    }
    .home-hero-lead {
      display: block !important;
      width: fit-content;
      max-width: min(100%, 325px);
      font-size: 13px !important;
      line-height: 1.55 !important;
      padding: 10px 14px !important;
      margin-top: 18px !important;
      white-space: normal !important;
      overflow-wrap: anywhere;
    }
    .home-hero-mobile-break {
      display: inline;
    }
    .home-about-grid {
      grid-template-columns: 1fr !important;
      gap: 18px !important;
    }
    .home-about-image {
      width: 100% !important;
      height: auto !important;
      aspect-ratio: 4 / 3;
      object-fit: cover !important;
      display: block;
    }
    .home-about-copy {
      text-align: left;
    }
    .home-about-actions {
      justify-content: center !important;
      gap: 12px !important;
      flex-wrap: wrap !important;
      margin-top: 18px !important;
    }
    .home-about-actions a {
      min-width: 118px;
      padding: 10px 22px !important;
      line-height: 1.35;
    }
    .home-steps-flow {
      flex-direction: column !important;
      gap: 12px !important;
    }
    .home-step-card,
    .home-step-final {
      border-radius: 28px !important;
      height: auto !important;
      min-height: 58px;
      width: min(100%, 320px) !important;
    }
    .home-step-card > div,
    .home-step-final > div {
      font-size: 16px !important;
      letter-spacing: 0 !important;
      line-height: 1.4;
      text-align: center;
      white-space: normal !important;
      writing-mode: horizontal-tb !important;
    }
    .home-step-arrow {
      border-bottom: 0 !important;
      border-left: 11px solid transparent !important;
      border-right: 11px solid transparent !important;
      border-top: 14px solid #1a9d5e !important;
      height: 0 !important;
      width: 0 !important;
    }
  }
</style>
</helmet>
<div style="font-family: 'Noto Sans JP',sans-serif; color: #333; background: #ffffff; min-height: 100vh; position: relative">

  <section class="home-hero" data-screen-label="ホーム / ヒーロー" style="position:relative; height:560px; background:#cfcfcf url('assets/hero.jpg') center/cover no-repeat; display:flex; align-items:flex-end; overflow:hidden;">
    <div style="position:absolute; inset:0; background:linear-gradient(90deg, rgba(0,0,0,0.45) 0%, rgba(0,0,0,0.15) 55%, rgba(0,0,0,0) 100%);"></div>

    </div>

  </section>

    <div style="text-align:center; margin:6px 0 0;">

        <rect x="6" y="6" width="46" height="46" rx="14"></rect>
        <circle cx="29" cy="29" r="12"></circle>
        <circle cx="42" cy="16" r="2.6" fill="#ffffff" stroke="none"></circle>

        <div style="font-size:21px; font-weight:800; letter-spacing:0.5px;">Instagram<span style="font-size:13px; font-weight:700; margin-left:4px;">はこちら</span></div>

      <div class="home-about-copy">

        <p style="font-size: 14px; color: #555; line-height: 1.9; margin: 0">従来の駅舎に限らず、様々な施設や場所がまちの駅として機能しています。全国各地のまちの駅は、一つのネットワークでつながり、地域の活性化と交流を促進しています。</p>
        <div class="home-about-actions" style="display: flex; gap: 12px; margin-top: 16px; flex-direction: row; justify-content: space-around">
          <a href="about.dc.html" style="background: #1a9d5e; color: #fff; text-decoration: none; font-size: 14px; padding: 8px 22px; border-radius: 20px; transition: transform .15s ease, box-shadow .15s ease, filter .15s ease; text-align: center; flex-direction: row; justify-content: space-around" style-hover="filter:brightness(1.1); transform:translateY(-2px); box-shadow:0 4px 10px rgba(26,157,94,0.4);" style-active="transform:translateY(0); filter:brightness(0.95);">もっと見る</a><a href="https://drive.google.com/file/d/1jLT1q0KLWjBOz9_ZIQhdTunQFfzVKkKI/view" style="background: #1a9d5e; color: #fff; text-decoration: none; font-size: 14px; padding: 8px 22px; border-radius: 20px; transition: transform .15s ease, box-shadow .15s ease, filter .15s ease; text-align: center; flex-direction: row; justify-content: space-around" style-hover="filter:brightness(1.1); transform:translateY(-2px); box-shadow:0 4px 10px rgba(26,157,94,0.4);" style-active="transform:translateY(0); filter:brightness(0.95);">資料を見る</a>

        <div class="home-step-arrow" style="width:0; height:0; border-top:11px solid transparent; border-bottom:11px solid transparent; border-left:14px solid #1a9d5e; flex:none;"></div>

      <div class="home-step-final" style="width:62px; height:205px; background:#1a9d5e; border-radius:34px; display:flex; align-items:center; justify-content:center; box-sizing:border-box; flex:none;">

    </div>
  </section><div style="max-width:680px; margin:54px auto 0; border-top:1px solid #ddd;"></div>

  <!-- NATIONWIDE -->
  <section data-screen-label="ホーム / 全国のまちの駅" style="max-width:680px; margin:54px auto 0; padding:0 20px 70px;">

  <dc-import name="Footer" active="home" hint-size="100%,420px"></dc-import>
