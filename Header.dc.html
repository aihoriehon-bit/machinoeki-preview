<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex,nofollow">
<title>まちの駅 公式サイト</title>
<script src="./support.js"></script>
<script src="./site-mobile.js" defer></script>
</head>
<body>
<x-dc>
<helmet>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&family=Zen+Maru+Gothic:wght@500;700;900&display=swap" rel="stylesheet">
<style>
  html, body { max-width: 100%; overflow-x: hidden; }
  *, *::before, *::after { box-sizing: border-box; }
  img, svg, video, canvas, iframe { max-width: 100%; }
  .site-menu-button,
  .site-menu-close,
  .site-menu-backdrop {
    display: none;
  }
  @media (max-width: 720px) {
    header {
      gap: 12px !important;
      height: 72px !important;
      min-height: 72px !important;
      padding: 10px 14px !important;
      overflow: visible !important;
      position: relative !important;
    }
    header > a {
      flex: 0 0 auto !important;
      position: relative !important;
      transition: opacity .16s ease;
      z-index: 1002 !important;
    }
    header > a img {
      height: 44px !important;
      max-width: 170px !important;
      object-fit: contain !important;
    }
    .site-header.is-menu-open > a {
      opacity: 0;
      pointer-events: none;
      z-index: 999 !important;
    }
    .site-menu-button {
      appearance: none;
      background: #ffffff;
      border: 1px solid rgba(255,255,255,0.95);
      border-radius: 6px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.18);
      color: #1a9d5e;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      flex: 0 0 48px;
      gap: 3px;
      height: 44px;
      margin-left: auto;
      padding: 5px 6px 4px;
      position: relative;
      z-index: 1002;
      font-family: 'Noto Sans JP', sans-serif;
      transition: background .16s ease, border-color .16s ease;
    }
    .site-menu-button-line {
      background: #1a9d5e;
      border-radius: 999px;
      display: block;
      height: 2px;
      width: 22px;
      transition: transform .18s ease, opacity .18s ease;
    }
    .site-menu-button-text {
      font-size: 9px;
      font-weight: 700;
      line-height: 1;
      letter-spacing: 0;
    }
    .site-header.is-menu-open .site-menu-button {
      background: #eef8f2;
      border-color: rgba(255,255,255,0.95);
    }
    .site-header.is-menu-open .site-menu-button-line:nth-child(1) {
      transform: translateY(5px) rotate(45deg);
    }
    .site-header.is-menu-open .site-menu-button-line:nth-child(2) {
      opacity: 0;
    }
    .site-header.is-menu-open .site-menu-button-line:nth-child(3) {
      transform: translateY(-5px) rotate(-45deg);
    }
    header nav {
      background: #ffffff !important;
      border-left: 1px solid rgba(0,0,0,0.08) !important;
      box-shadow: -14px 0 30px rgba(0,0,0,0.16) !important;
      display: flex !important;
      flex: none !important;
      flex-direction: column !important;
      align-items: stretch !important;
      gap: 0 !important;
      height: 100dvh !important;
      max-height: 100dvh !important;
      min-width: 0 !important;
      max-width: min(82vw, 330px) !important;
      overflow-y: auto !important;
      overscroll-behavior: contain !important;
      padding: 78px 22px 28px !important;
      position: fixed !important;
      right: 0 !important;
      top: 0 !important;
      transform: translateX(104%) !important;
      transition: transform .22s ease !important;
      width: min(82vw, 330px) !important;
      z-index: 1001 !important;
      justify-content: flex-start !important;
      -webkit-overflow-scrolling: touch;
    }
    .site-header.is-menu-open nav {
      transform: translateX(0) !important;
    }
    .site-menu-close {
      display: none !important;
    }
    .site-menu-close-icon {
      font-size: 20px;
      font-weight: 500;
      line-height: 1;
      margin-top: -1px;
    }
    header nav a {
      border-bottom: 1px solid #e6efe9 !important;
      color: #1f4f38 !important;
      display: block !important;
      font-size: 15px !important;
      flex: 0 0 auto !important;
      font-weight: 700 !important;
      padding: 16px 2px !important;
      white-space: normal !important;
    }
    .site-menu-backdrop {
      appearance: none;
      background: rgba(0,0,0,0.34);
      border: 0;
      cursor: pointer;
      display: block;
      inset: 0;
      opacity: 0;
      pointer-events: none;
      position: fixed;
      transition: opacity .2s ease;
      z-index: 1000;
    }
    .site-header.is-menu-open .site-menu-backdrop {
      opacity: 1;
      pointer-events: auto;
    }
    section,
    div[style*="max-width:680px"],
    div[style*="max-width:720px"],
    div[style*="max-width:820px"],
    div[style*="max-width:960px"],
    div[style*="max-width:980px"] {
      max-width: 100% !important;
    }
    [style*="grid-template-columns:240px 1fr"],
    [style*="grid-template-columns: 240px 1fr"],
    [style*="grid-template-columns:1fr 1fr"],
    [style*="grid-template-columns: 1fr 1fr"],
    [style*="grid-template-columns:1fr 1fr 1fr"],
    [style*="grid-template-columns: 1fr 1fr 1fr"],
    [style*="grid-template-columns:repeat(3,1fr)"],
    [style*="grid-template-columns: repeat(3, 1fr)"] {
      grid-template-columns: 1fr !important;
      gap: 24px !important;
    }
    [style*="display:flex; align-items:center; gap:14px"],
    [style*="display: flex; align-items: center; gap: 14px"] {
      align-items: stretch !important;
      flex-direction: column !important;
      gap: 8px !important;
    }
    [style*="height:560px"] {
      height: 460px !important;
    }
    h1 {
      font-size: clamp(30px, 10vw, 46px) !important;
      letter-spacing: 0 !important;
    }
    footer nav {
      flex-wrap: wrap !important;
      justify-content: center !important;
      overflow-x: visible !important;
      row-gap: 10px !important;
    }
  }
  body.site-menu-lock {
    overflow: hidden;
    touch-action: none;
  }
</style>
</helmet>
<header class="site-header" style="background:#1a9d5e; display:flex; align-items:center; justify-content:space-between; padding:0 30px; height:62px; box-sizing:border-box; font-family:'Noto Sans JP',sans-serif; width:100%;">
  <a class="site-logo" href="index.dc.html" style="display:flex; align-items:center; text-decoration:none; flex:none;">
    <img src="assets/logo-full.png" alt="まちの駅 — 人と人の出会いと交流をサポートする まちの情報発信拠点" style="display:block; height:40px; width:auto;">
  </a>
  <button class="site-menu-button" type="button" aria-label="メニューを開く" aria-expanded="false">
    <span class="site-menu-button-line"></span>
    <span class="site-menu-button-line"></span>
    <span class="site-menu-button-line"></span>
    <span class="site-menu-button-text">MENU</span>
  </button>
  <nav class="site-nav" aria-label="メインメニュー" style="display:flex; align-items:center; gap:22px;">
    <button class="site-menu-close" type="button" aria-label="メニューを閉じる">
      <span class="site-menu-close-icon" aria-hidden="true">×</span>
      <span>閉じる</span>
    </button>
    <sc-for list="{{ items }}" as="item" hint-placeholder-count="7">
      <sc-if value="{{ item.isActive }}" hint-placeholder-val="{{ true }}">
        <a href="{{ item.href }}" style="color:#ffffff; text-decoration:none; font-size:13px; font-weight:700; white-space:nowrap; border-bottom:2px solid #ffffff; padding-bottom:3px; transition:opacity .15s ease;" style-hover="opacity:0.7;">{{ item.label }}</a>
      </sc-if>
      <sc-if value="{{ item.isInactive }}" hint-placeholder-val="{{ true }}">
        <a href="{{ item.href }}" style="color:#ffffff; text-decoration:none; font-size:13px; font-weight:500; white-space:nowrap; border-bottom:2px solid transparent; padding-bottom:3px; transition:opacity .15s ease, border-color .15s ease;" style-hover="opacity:0.75; border-bottom:2px solid rgba(255,255,255,0.6);">{{ item.label }}</a>
      </sc-if>
    </sc-for>
  </nav>
  <button class="site-menu-backdrop" type="button" aria-label="メニューを閉じる"></button>
</header>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:1280,&quot;height&quot;:62},&quot;active&quot;:{&quot;editor&quot;:&quot;enum&quot;,&quot;options&quot;:[&quot;home&quot;,&quot;about&quot;,&quot;become&quot;,&quot;goods&quot;,&quot;nationwide&quot;,&quot;members&quot;,&quot;contact&quot;],&quot;default&quot;:&quot;home&quot;,&quot;tsType&quot;:&quot;string&quot;}}">
class Component extends DCLogic {
  renderVals() {
    const active = this.props.active || 'home';
    const nav = [
      { key: 'home', label: 'ホーム', href: 'index.dc.html' },
      { key: 'about', label: 'まちの駅とは', href: 'about.dc.html' },
      { key: 'become', label: 'まちの駅になるには', href: 'become.dc.html' },
      { key: 'goods', label: 'オリジナルグッズ', href: 'goods.dc.html' },
      { key: 'nationwide', label: '全国まちの駅', href: 'nationwide.dc.html' },
      { key: 'members', label: 'まちの駅会員の方', href: 'members.dc.html' },
      { key: 'contact', label: 'お問い合わせ', href: 'contact.dc.html' },
    ];
    const items = nav.map(n => ({
      label: n.label, href: n.href,
      isActive: n.key === active, isInactive: n.key !== active,
    }));
    return { items };
  }
}
</script>
</body>
</html>
